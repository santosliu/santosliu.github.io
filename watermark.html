<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社群圖片水印工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c2a;
    --border: #2a2a3d;
    --accent: #ff3e6c;
    --accent2: #00e5ff;
    --accent3: #ffe566;
    --text: #f0f0ff;
    --text-dim: #7070a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -1px;
    line-height: 1;
  }

  header h1 span { color: var(--accent); }
  header h1 em { color: var(--accent2); font-style: normal; }

  header p {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  /* Section titles */
  .section-label {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 12px;
  }

  .section {
    margin-bottom: 28px;
  }

  /* Platform grid */
  .platform-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .platform-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
  }

  .platform-btn:hover {
    background: var(--surface2);
    border-color: var(--accent2);
  }

  .platform-btn.active {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }

  .platform-btn .p-icon { font-size: 16px; }

  .platform-btn .p-info { display: flex; flex-direction: column; gap: 2px; }

  .platform-btn .p-name { font-weight: 700; }

  .platform-btn .p-size {
    font-size: 9px;
    color: var(--text-dim);
  }

  .platform-btn.active .p-size { color: var(--accent); opacity: 0.7; }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .upload-zone::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,62,108,0) 0%, rgba(0,229,255,0) 100%);
    transition: all 0.3s;
  }

  .upload-zone:hover:not(.disabled),
  .upload-zone.drag-over {
    border-color: var(--accent2);
    background: var(--surface2);
  }

  .upload-zone:hover:not(.disabled)::after,
  .upload-zone.drag-over::after {
    background: linear-gradient(135deg, rgba(255,62,108,0.05) 0%, rgba(0,229,255,0.05) 100%);
  }

  .upload-zone.disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .upload-icon { font-size: 40px; margin-bottom: 10px; display: block; }

  .upload-zone h2 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .upload-zone p {
    color: var(--text-dim);
    font-size: 11px;
  }

  .upload-btn {
    display: inline-block;
    margin-top: 14px;
    padding: 8px 24px;
    background: var(--accent);
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .upload-btn:hover {
    background: #ff6b8a;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(255,62,108,0.4);
  }

  #fileInput { display: none; }

  /* Canvas preview */
  .preview-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
  }

  #previewCanvas {
    max-width: 100%;
    max-height: 600px;
    border-radius: 4px;
    display: none;
  }

  .preview-placeholder {
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
  }

  .preview-placeholder span { font-size: 32px; display: block; margin-bottom: 8px; }

  /* Controls */
  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 600px) {
    .controls-grid { grid-template-columns: 1fr; }
  }

  .control-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }

  .control-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .control-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .control-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--accent2);
  }

  .control-value span {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-weight: 400;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s;
    box-shadow: 0 0 6px rgba(255,62,108,0.5);
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  /* Format buttons */
  .fmt-group {
    display: flex;
    gap: 8px;
  }

  .fmt-btn {
    flex: 1;
    padding: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .fmt-btn:hover {
    background: var(--surface2);
    border-color: var(--accent2);
  }

  .fmt-btn.active {
    background: var(--surface2);
    border-color: var(--accent3);
    color: var(--accent3);
  }

  /* Download button */
  #downloadBtn {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #c0175a);
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  #downloadBtn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(255,62,108,0.4);
  }

  #downloadBtn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    background: var(--surface2);
    color: var(--text-dim);
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1><span>水印</span><em>合成</em>工具</h1>
    <p>上傳圖片，自動加上 ludens.png 水印並輸出原始解析度</p>
  </header>

  <!-- 1. 社群格式選擇器 -->
  <div class="section">
    <div class="section-label">01 — 選擇社群格式</div>
    <div class="platform-grid" id="platformGrid"></div>
  </div>

  <!-- 2. 上傳區 -->
  <div class="section">
    <div class="section-label">02 — 上傳圖片</div>
    <div class="upload-zone disabled" id="uploadZone">
      <span class="upload-icon">🖼️</span>
      <h2>拖曳或點選上傳圖片</h2>
      <p>請先選擇社群格式，再上傳圖片</p>
      <button class="upload-btn" id="uploadBtn" disabled>選擇圖片</button>
      <input type="file" id="fileInput" accept="image/*">
    </div>
  </div>

  <!-- 3. Canvas 預覽 -->
  <div class="section">
    <div class="section-label">03 — 預覽</div>
    <div class="preview-wrap">
      <canvas id="previewCanvas"></canvas>
      <div class="preview-placeholder" id="previewPlaceholder">
        <span>🎨</span>
        上傳圖片後即時預覽合成結果
      </div>
    </div>
  </div>

  <!-- 4. 調整控制項 -->
  <div class="section">
    <div class="section-label">04 — 調整水印</div>
    <div class="controls-grid">
      <div class="control-item">
        <div class="control-header">
          <span class="control-label">水印大小</span>
          <span class="control-value"><span id="sizeVal">30</span> <span>% 寬度</span></span>
        </div>
        <input type="range" id="sizeSlider" min="10" max="80" value="30">
      </div>
      <div class="control-item">
        <div class="control-header">
          <span class="control-label">水印透明度</span>
          <span class="control-value"><span id="opacityVal">80</span> <span>%</span></span>
        </div>
        <input type="range" id="opacitySlider" min="0" max="100" value="80">
      </div>
    </div>
  </div>

  <!-- 5. 輸出格式 -->
  <div class="section">
    <div class="section-label">05 — 輸出格式</div>
    <div class="fmt-group">
      <button class="fmt-btn active" data-fmt="jpg">JPG</button>
      <button class="fmt-btn" data-fmt="png">PNG</button>
      <button class="fmt-btn" data-fmt="webp">WebP</button>
    </div>
  </div>

  <!-- 6. 下載按鈕 -->
  <button id="downloadBtn" disabled>下載圖片（原始解析度）</button>

</div>

<script>
  const platforms = [
    { id: 'ig-post-square',    name: 'IG 貼文 (方形)',   w: 1080, h: 1080, icon: '📷', color: '#e1306c' },
    { id: 'ig-post-portrait',  name: 'IG 貼文 (直式)',   w: 1080, h: 1350, icon: '📷', color: '#e1306c' },
    { id: 'ig-post-landscape', name: 'IG 貼文 (橫式)',   w: 1080, h:  566, icon: '📷', color: '#e1306c' },
    { id: 'ig-stories',        name: 'IG/限時動態',      w: 1080, h: 1920, icon: '📱', color: '#e1306c' },
    { id: 'fb-post',           name: 'FB 貼文',          w: 1200, h:  630, icon: '📘', color: '#1877f2' },
    { id: 'fb-stories',        name: 'FB Stories',       w: 1080, h: 1920, icon: '📱', color: '#1877f2' },
    { id: 'yt-shorts',         name: 'YT Shorts 封面',   w: 1080, h: 1920, icon: '📱', color: '#ff0000' },
    { id: 'tw-post',           name: 'X 貼文圖片',       w: 1200, h:  675, icon: '🐦', color: '#1d9bf0' },
    { id: 'line-oa-cover',     name: 'LINE OA 封面',     w: 1080, h:  878, icon: '💬', color: '#00c300' },
    { id: 'threads-post',      name: 'Threads 貼文',     w: 1080, h: 1080, icon: '🧵', color: '#101010' },
    { id: 'tiktok-cover',      name: 'TikTok 封面',      w: 1080, h: 1920, icon: '🎵', color: '#ff0050' },
    { id: 'linkedin-post',     name: 'LinkedIn 貼文',    w: 1200, h:  627, icon: '💼', color: '#0a66c2' },
  ];

  // State
  let selectedPlatform = null;
  let uploadedImg = null;
  let watermarkImg = null;
  let outputFmt = 'jpg';
  let wmSize = 30;
  let wmOpacity = 80;

  // Elements
  const platformGrid  = document.getElementById('platformGrid');
  const uploadZone    = document.getElementById('uploadZone');
  const uploadBtn     = document.getElementById('uploadBtn');
  const fileInput     = document.getElementById('fileInput');
  const previewCanvas = document.getElementById('previewCanvas');
  const previewPlaceholder = document.getElementById('previewPlaceholder');
  const sizeSlider    = document.getElementById('sizeSlider');
  const opacitySlider = document.getElementById('opacitySlider');
  const sizeVal       = document.getElementById('sizeVal');
  const opacityVal    = document.getElementById('opacityVal');
  const downloadBtn   = document.getElementById('downloadBtn');

  // Fixed output canvas (reuse across renders)
  const outputCanvas = document.createElement('canvas');

  // Build platform buttons
  platforms.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'platform-btn';
    btn.dataset.id = p.id;
    btn.innerHTML = `
      <span class="p-icon">${p.icon}</span>
      <span class="p-info">
        <span class="p-name">${p.name}</span>
        <span class="p-size">${p.w} × ${p.h}</span>
      </span>
    `;
    btn.addEventListener('click', () => selectPlatform(p, btn));
    platformGrid.appendChild(btn);
  });

  function selectPlatform(p, btn) {
    downloadBtn.disabled = true;
    selectedPlatform = p;
    document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Enable upload
    uploadZone.classList.remove('disabled');
    uploadBtn.disabled = false;
    uploadZone.querySelector('p').textContent = `格式：${p.name}（${p.w} × ${p.h}）`;
    // Re-render if image already loaded
    if (uploadedImg) renderCanvas();
  }

  // Load watermark image once
  watermarkImg = new Image();
  watermarkImg.src = 'ludens.png';
  watermarkImg.onload = () => { if (uploadedImg && selectedPlatform) renderCanvas(); };
  watermarkImg.onerror = () => {
    console.error('ludens.png 載入失敗，水印將不會顯示');
  };

  // Upload zone interactions
  uploadZone.addEventListener('click', e => {
    if (uploadZone.classList.contains('disabled')) return;
    if (e.target === uploadBtn || e.target.closest('#uploadBtn')) return;
    fileInput.click();
  });

  uploadBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (!uploadBtn.disabled) fileInput.click();
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadImage(fileInput.files[0]);
  });

  uploadZone.addEventListener('dragover', e => {
    e.preventDefault();
    if (!uploadZone.classList.contains('disabled')) uploadZone.classList.add('drag-over');
  });

  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));

  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    if (uploadZone.classList.contains('disabled')) return;
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImage(file);
  });

  function showUploadError(msg) {
    uploadZone.style.borderColor = 'var(--accent)';
    let errEl = uploadZone.querySelector('.upload-error-msg');
    if (!errEl) {
      errEl = document.createElement('p');
      errEl.className = 'upload-error-msg';
      errEl.style.color = 'var(--accent)';
      errEl.style.marginTop = '8px';
      uploadZone.appendChild(errEl);
    }
    errEl.textContent = msg;
  }

  function clearUploadError() {
    uploadZone.style.borderColor = '';
    const errEl = uploadZone.querySelector('.upload-error-msg');
    if (errEl) errEl.remove();
  }

  function loadImage(file) {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        clearUploadError();
        uploadedImg = img;
        renderCanvas();
      };
      img.onerror = () => {
        showUploadError('圖片載入失敗，請選擇有效的圖片檔案');
      };
      img.src = ev.target.result;
    };
    reader.onerror = () => {
      showUploadError('圖片載入失敗，請選擇有效的圖片檔案');
    };
    reader.readAsDataURL(file);
  }

  function renderCanvas() {
    if (!uploadedImg || !selectedPlatform) return;

    const cw = selectedPlatform.w;
    const ch = selectedPlatform.h;

    // Output canvas (full resolution, reuse fixed instance)
    outputCanvas.width  = cw;
    outputCanvas.height = ch;
    const ctx = outputCanvas.getContext('2d');

    // Center-crop image
    const scale = Math.max(cw / uploadedImg.naturalWidth, ch / uploadedImg.naturalHeight);
    const sw = cw / scale;
    const sh = ch / scale;
    const sx = (uploadedImg.naturalWidth  - sw) / 2;
    const sy = (uploadedImg.naturalHeight - sh) / 2;
    ctx.drawImage(uploadedImg, sx, sy, sw, sh, 0, 0, cw, ch);

    // Watermark center-bottom
    if (watermarkImg.complete && watermarkImg.naturalWidth > 0) {
      const wmW = cw * (wmSize / 100);
      const wmH = wmW * (watermarkImg.naturalHeight / watermarkImg.naturalWidth);
      const wmX = (cw - wmW) / 2;
      const padding = ch * 0.03;
      const wmY = ch - wmH - padding;
      ctx.globalAlpha = wmOpacity / 100;
      ctx.drawImage(watermarkImg, wmX, wmY, wmW, wmH);
      ctx.globalAlpha = 1;
    }

    // Copy to preview canvas (scaled to max 600px wide)
    const maxW = Math.min(600, cw);
    const scale2 = maxW / cw;
    previewCanvas.width  = cw * scale2;
    previewCanvas.height = ch * scale2;
    const pCtx = previewCanvas.getContext('2d');
    pCtx.drawImage(outputCanvas, 0, 0, previewCanvas.width, previewCanvas.height);

    previewCanvas.style.display = 'block';
    previewPlaceholder.style.display = 'none';

    // Store output canvas for download
    previewCanvas._outputCanvas = outputCanvas;

    downloadBtn.disabled = false;
  }

  // Sliders
  sizeSlider.addEventListener('input', () => {
    wmSize = parseInt(sizeSlider.value);
    sizeVal.textContent = wmSize;
    if (uploadedImg && selectedPlatform) renderCanvas();
  });

  opacitySlider.addEventListener('input', () => {
    wmOpacity = parseInt(opacitySlider.value);
    opacityVal.textContent = wmOpacity;
    if (uploadedImg && selectedPlatform) renderCanvas();
  });

  // Output format buttons
  document.querySelectorAll('.fmt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      outputFmt = btn.dataset.fmt;
    });
  });

  function isWebpSupported() {
    const c = document.createElement('canvas');
    c.width = 1; c.height = 1;
    return c.toDataURL('image/webp').startsWith('data:image/webp');
  }

  // Download
  downloadBtn.addEventListener('click', () => {
    if (outputCanvas.width === 0) return;
    const mimeMap = { jpg: 'image/jpeg', png: 'image/png', webp: 'image/webp' };
    let fmt = outputFmt;
    let ext = outputFmt;
    if (fmt === 'webp' && !isWebpSupported()) {
      fmt = 'png';
      ext = 'png';
    }
    const url = outputCanvas.toDataURL(mimeMap[fmt], 0.95);
    const a = document.createElement('a');
    a.href = url;
    a.download = `watermark.${ext}`;
    a.click();
  });
</script>
</body>
</html>
