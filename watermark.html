<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社群圖片水印工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c2a;
    --border: #2a2a3d;
    --accent: #ff3e6c;
    --accent2: #00e5ff;
    --accent3: #ffe566;
    --text: #f0f0ff;
    --text-dim: #7070a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -1px;
    line-height: 1;
  }

  header h1 span { color: var(--accent); }
  header h1 em { color: var(--accent2); font-style: normal; }

  header p {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 12px;
  }

  .section { margin-bottom: 28px; }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .upload-zone::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,62,108,0) 0%, rgba(0,229,255,0) 100%);
    transition: all 0.3s;
    pointer-events: none;
  }

  .upload-zone:hover,
  .upload-zone.drag-over {
    border-color: var(--accent2);
    background: var(--surface2);
  }

  .upload-zone:hover::after,
  .upload-zone.drag-over::after {
    background: linear-gradient(135deg, rgba(255,62,108,0.05) 0%, rgba(0,229,255,0.05) 100%);
  }

  .upload-icon { font-size: 40px; margin-bottom: 10px; display: block; }

  .upload-zone h2 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .upload-zone > p {
    color: var(--text-dim);
    font-size: 11px;
  }

  .upload-btn {
    display: inline-block;
    margin-top: 14px;
    padding: 8px 24px;
    background: var(--accent);
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    z-index: 1;
  }

  .upload-btn:hover {
    background: #ff6b8a;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(255,62,108,0.4);
  }

  #fileInput { display: none; }

  /* Controls */
  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 600px) {
    .controls-grid { grid-template-columns: 1fr; }
  }

  .control-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }

  .control-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .control-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .control-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--accent2);
  }

  .control-value span {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-weight: 400;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s;
    box-shadow: 0 0 6px rgba(255,62,108,0.5);
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  /* Format cards */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .format-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.15s;
  }

  .format-card:hover { border-color: var(--accent2); }

  .card-preview {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 160px;
    overflow: hidden;
  }

  .card-preview canvas {
    max-width: 100%;
    max-height: 100%;
  }

  .card-placeholder {
    color: var(--text-dim);
    font-size: 10px;
    text-align: center;
    line-height: 1.8;
  }

  .card-info {
    padding: 10px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
  }

  .card-size {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .card-filename {
    font-size: 9px;
    color: var(--accent3);
    opacity: 0.7;
    margin-top: 2px;
  }

  .card-dl-btn {
    display: block;
    width: 100%;
    padding: 9px;
    background: var(--surface2);
    border: none;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: not-allowed;
    transition: all 0.15s;
  }

  .card-dl-btn.ready {
    color: var(--accent2);
    cursor: pointer;
  }

  .card-dl-btn.ready:hover {
    background: var(--accent2);
    color: #000;
  }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1><span>水印</span><em>合成</em>工具</h1>
    <p>上傳圖片，自動輸出所有社群格式</p>
  </header>

  <!-- 1. 上傳圖片 -->
  <div class="section">
    <div class="section-label">01 — 上傳圖片</div>
    <div class="upload-zone" id="uploadZone">
      <span class="upload-icon">🖼️</span>
      <h2>拖曳或點選上傳圖片</h2>
      <p id="uploadHint">上傳後自動產出全部社群格式</p>
      <button class="upload-btn" id="uploadBtn">選擇圖片</button>
      <input type="file" id="fileInput" accept="image/*">
    </div>
  </div>

  <!-- 2. 調整水印（上傳後顯示）-->
  <div class="section hidden" id="controlsSection">
    <div class="section-label">02 — 調整水印</div>
    <div class="controls-grid" style="grid-template-columns: 1fr;">
      <div class="control-item">
        <div class="control-header">
          <span class="control-label">水印透明度</span>
          <span class="control-value"><span id="opacityVal">80</span> <span>%</span></span>
        </div>
        <input type="range" id="opacitySlider" min="0" max="100" value="80">
      </div>
    </div>
  </div>

  <!-- 3. 格式卡片（上傳後顯示）-->
  <div class="section hidden" id="cardsSection">
    <div class="section-label">03 — 預覽 &amp; 下載</div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

</div>
<script>
  const platforms = [
    { id: 'ig-post-square',    name: 'IG 貼文 (方形)',   w: 1080, h: 1080, icon: '📷', filename: 'ig-square.png' },
    { id: 'ig-post-portrait',  name: 'IG 貼文 (直式)',   w: 1080, h: 1350, icon: '📷', filename: 'ig-portrait.png' },
    { id: 'ig-post-landscape', name: 'IG 貼文 (橫式)',   w: 1080, h:  566, icon: '📷', filename: 'ig-landscape.png' },
    { id: 'ig-stories',        name: 'IG/限時動態',      w: 1080, h: 1920, icon: '📱', filename: 'ig-stories.png' },
    { id: 'fb-post',           name: 'FB 貼文',          w: 1200, h:  630, icon: '📘', filename: 'facebook.png' },
    { id: 'fb-stories',        name: 'FB Stories',       w: 1080, h: 1920, icon: '📱', filename: 'fb-stories.png' },
    { id: 'yt-shorts',         name: 'YT Shorts 封面',   w: 1080, h: 1920, icon: '📱', filename: 'youtube-shorts.png' },
    { id: 'tw-post',           name: 'X 貼文圖片',       w: 1200, h:  675, icon: '🐦', filename: 'twitter.png' },
    { id: 'line-oa-cover',     name: 'LINE OA 封面',     w: 1080, h:  878, icon: '💬', filename: 'line.png' },
    { id: 'threads-post',      name: 'Threads 貼文',     w: 1080, h: 1080, icon: '🧵', filename: 'threads.png' },
    { id: 'tiktok-cover',      name: 'TikTok 封面',      w: 1080, h: 1920, icon: '🎵', filename: 'tiktok.png' },
    { id: 'linkedin-post',     name: 'LinkedIn 貼文',    w: 1200, h:  627, icon: '💼', filename: 'linkedin.png' },
  ];

  let uploadedImg = null;
  let watermarkImg = null;
  const wmSize = 100;
  let wmOpacity = 80;

  const uploadZone     = document.getElementById('uploadZone');
  const uploadBtn      = document.getElementById('uploadBtn');
  const uploadHint     = document.getElementById('uploadHint');
  const fileInput      = document.getElementById('fileInput');
  const opacitySlider  = document.getElementById('opacitySlider');
  const opacityVal     = document.getElementById('opacityVal');
  const controlsSection = document.getElementById('controlsSection');
  const cardsSection   = document.getElementById('cardsSection');
  const cardsGrid      = document.getElementById('cardsGrid');

  // Per-format output canvases (reused across re-renders)
  const outputCanvases = {};
  platforms.forEach(p => { outputCanvases[p.id] = document.createElement('canvas'); });

  // Load watermark
  watermarkImg = new Image();
  watermarkImg.src = 'ludens.png';
  watermarkImg.onload = () => { if (uploadedImg) renderAll(); };
  watermarkImg.onerror = () => console.error('ludens.png 載入失敗，水印將不顯示');

  // Build format cards
  platforms.forEach(p => {
    const card = document.createElement('div');
    card.className = 'format-card';
    card.dataset.id = p.id;

    const previewDiv = document.createElement('div');
    previewDiv.className = 'card-preview';
    previewDiv.innerHTML = `<div class="card-placeholder">${p.icon}<br>${p.w} × ${p.h}</div>`;

    const info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = `
      <div class="card-name">${p.icon} ${p.name}</div>
      <div class="card-size">${p.w} × ${p.h} px</div>
      <div class="card-filename">${p.filename}</div>
    `;

    const dlBtn = document.createElement('button');
    dlBtn.className = 'card-dl-btn';
    dlBtn.textContent = '↓ 下載';
    dlBtn.disabled = true;
    dlBtn.addEventListener('click', () => downloadFormat(p));

    card.appendChild(previewDiv);
    card.appendChild(info);
    card.appendChild(dlBtn);
    cardsGrid.appendChild(card);
  });

  function renderAll() {
    platforms.forEach(p => renderFormat(p));
  }

  function renderFormat(p) {
    const cw = p.w, ch = p.h;
    const oc = outputCanvases[p.id];
    oc.width = cw;
    oc.height = ch;
    const ctx = oc.getContext('2d');

    // Center-crop
    const scale = Math.max(cw / uploadedImg.naturalWidth, ch / uploadedImg.naturalHeight);
    const sw = cw / scale, sh = ch / scale;
    const sx = (uploadedImg.naturalWidth  - sw) / 2;
    const sy = (uploadedImg.naturalHeight - sh) / 2;
    ctx.drawImage(uploadedImg, sx, sy, sw, sh, 0, 0, cw, ch);

    // Watermark center-bottom
    if (watermarkImg.complete && watermarkImg.naturalWidth > 0) {
      const wmW = cw * (wmSize / 100);
      const wmH = wmW * (watermarkImg.naturalHeight / watermarkImg.naturalWidth);
      const wmX = (cw - wmW) / 2;
      const wmY = ch - wmH;
      ctx.globalAlpha = wmOpacity / 100;
      ctx.drawImage(watermarkImg, wmX, wmY, wmW, wmH);
      ctx.globalAlpha = 1;
    }

    // Update card thumbnail (fixed 160px height)
    const card = cardsGrid.querySelector(`[data-id="${p.id}"]`);
    const previewDiv = card.querySelector('.card-preview');
    let pc = previewDiv.querySelector('canvas');
    if (!pc) {
      previewDiv.innerHTML = '';
      pc = document.createElement('canvas');
      previewDiv.appendChild(pc);
    }
    const previewH = 160;
    const previewW = Math.round(cw * (previewH / ch));
    pc.width  = previewW;
    pc.height = previewH;
    pc.getContext('2d').drawImage(oc, 0, 0, previewW, previewH);

    // Enable download
    const dlBtn = card.querySelector('.card-dl-btn');
    dlBtn.disabled = false;
    dlBtn.classList.add('ready');
  }

  function downloadFormat(p) {
    const oc = outputCanvases[p.id];
    if (!oc.width) return;
    const a = document.createElement('a');
    a.href = oc.toDataURL('image/png');
    a.download = p.filename;
    a.click();
  }

  // Upload handlers
  uploadZone.addEventListener('click', e => {
    if (e.target === uploadBtn || e.target.closest('#uploadBtn')) return;
    fileInput.click();
  });

  uploadBtn.addEventListener('click', e => {
    e.stopPropagation();
    fileInput.click();
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadImage(fileInput.files[0]);
  });

  uploadZone.addEventListener('dragover', e => {
    e.preventDefault();
    uploadZone.classList.add('drag-over');
  });

  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));

  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImage(file);
  });

  function loadImage(file) {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        uploadedImg = img;
        uploadZone.querySelector('h2').textContent = '點選或拖曳以重新上傳';
        uploadHint.textContent = `已上傳：${file.name}`;
        uploadZone.style.borderColor = '';
        controlsSection.classList.remove('hidden');
        cardsSection.classList.remove('hidden');
        renderAll();
      };
      img.onerror = () => showUploadError('圖片載入失敗，請選擇有效的圖片檔案');
      img.src = ev.target.result;
    };
    reader.onerror = () => showUploadError('圖片載入失敗，請選擇有效的圖片檔案');
    reader.readAsDataURL(file);
  }

  function showUploadError(msg) {
    uploadZone.style.borderColor = 'var(--accent)';
    let errEl = uploadZone.querySelector('.upload-error-msg');
    if (!errEl) {
      errEl = document.createElement('p');
      errEl.className = 'upload-error-msg';
      errEl.style.cssText = 'color:var(--accent);margin-top:8px;font-size:11px';
      uploadZone.appendChild(errEl);
    }
    errEl.textContent = msg;
  }

  opacitySlider.addEventListener('input', () => {
    wmOpacity = parseInt(opacitySlider.value);
    opacityVal.textContent = wmOpacity;
    if (uploadedImg) renderAll();
  });
</script>
</body>
</html>
