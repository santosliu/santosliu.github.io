<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>產生 ludens.png</title>
<style>
  body { background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; font-family: sans-serif; color: #fff; }
  canvas { border: 1px solid #555; max-width: 100%; }
  button { padding: 10px 30px; background: #00e5ff; color: #000; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; }
  p { color: #aaa; font-size: 0.9rem; }
</style>
</head>
<body>
<p>預覽（實際輸出 1200×300px）</p>
<canvas id="c"></canvas>
<button onclick="download()">下載 ludens.png</button>

<script>
const W = 1200, H = 300;
const c = document.getElementById('c');
c.width = W; c.height = H;
const ctx = c.getContext('2d');

function draw() {
  ctx.clearRect(0, 0, W, H);

  // 上半透明，下半深色漸層
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,    'rgba(0,0,0,0)');
  grad.addColorStop(0.35, 'rgba(0,0,0,0)');
  grad.addColorStop(0.7,  'rgba(0,0,0,0.72)');
  grad.addColorStop(1,    'rgba(0,0,0,0.88)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 右側青色斜條紋
  const stripeColor = 'rgba(0,229,255,0.85)';
  const stripeW = 18;
  const gap = 32;
  const slant = H * 1.1;
  const startX = W * 0.72;
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  for (let i = 0; i < 6; i++) {
    const x = startX + i * gap;
    ctx.beginPath();
    ctx.moveTo(x,            H * 0.55);
    ctx.lineTo(x + stripeW,  H * 0.55);
    ctx.lineTo(x + stripeW - slant * 0.18, H);
    ctx.lineTo(x             - slant * 0.18, H);
    ctx.closePath();
    ctx.fillStyle = stripeColor;
    ctx.fill();
  }
  ctx.restore();

  // THE LUDENS 文字
  ctx.save();
  ctx.font = 'bold 42px "Arial Narrow", Arial, sans-serif';
  ctx.letterSpacing = '6px';
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('THE  LUDENS', W * 0.38, H * 0.83);
  ctx.restore();
}

draw();

function download() {
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = 'ludens.png';
  a.click();
}
</script>
</body>
</html>
